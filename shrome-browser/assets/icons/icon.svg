<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3584e4"/>
      <stop offset="100%" style="stop-color:#1c71d8"/>
    </linearGradient>
  </defs>
  
  <!-- Browser window background -->
  <rect x="10" y="15" width="80" height="65" rx="8" fill="url(#bg)"/>
  
  <!-- Tab bar -->
  <rect x="15" y="20" width="70" height="12" rx="2" fill="#1a1a2e" opacity="0.3"/>
  
  <!-- Address bar -->
  <rect x="15" y="38" width="70" height="10" rx="5" fill="#ffffff" opacity="0.9"/>
  
  <!-- Content area -->
  <rect x="15" y="52" width="70" height="23" rx="2" fill="#ffffff" opacity="0.2"/>
  
  <!-- Navigation dots -->
  <circle cx="20" cy="26" r="2" fill="#e01b24"/>
  <circle cx="27" cy="26" r="2" fill="#ff7800"/>
  <circle cx="34" cy="26" r="2" fill="#2ec27e"/>
  
  <!-- S letter stylized -->
  <path d="M 45 65 Q 45 60 50 60 L 55 60 Q 60 60 60 65 Q 60 70 55 70 L 50 70 Q 45 70 45 75 Q 45 80 50 80 L 55 80" 
        stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
